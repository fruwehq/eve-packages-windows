api_version: eve.plugin/v1
kind: package
id: discord
display_name: Discord
commands:
  install: {exec: scripts/package-plugin, args: [discord, install]}
  status: {exec: scripts/package-plugin, args: [discord, status]}
  down: {exec: scripts/package-plugin, args: [discord, down]}
supports: {os_families: [windows], arches: [amd64]}
compatibility_enforced: false
compatibility:
  - platform: ubuntu
    desktop: any
    session: any
    status: supported
    notes: Discord works on Linux desktops via the official .deb installer.
  - platform: windows
    desktop: Windows
    session: Native
    status: supported
    notes: Mic capture routes through the streaming protocol (Sunshine/Moonlight) and can echo. Consider running Discord on your local machine instead. Not in the gaming-streaming bundle by default.
down: {destructive: true}
env: []
install:
  windows:
    steps: [provision/windows/discord.ps1]
    state_files: []
    fallback: false
