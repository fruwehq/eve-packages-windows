api_version: eve.plugin/v1
kind: package
id: splashtop
display_name: Splashtop
commands:
  install: {exec: scripts/package-plugin, args: [splashtop, install]}
  status: {exec: scripts/package-plugin, args: [splashtop, status]}
  down: {exec: scripts/package-plugin, args: [splashtop, down]}
supports:
  os_families: [windows]
  arches: [amd64]
compatibility_enforced: true
compatibility:
  - platform: windows
    desktop: Windows
    session: Native
    status: supported
    notes: Splashtop Streamer runs against the active Windows desktop; free for same-LAN/VPN use after account login.
  - platform: ubuntu
    desktop: XFCE
    session: X11
    status: wip
    notes: Splashtop Streamer attaches to a local X11 session; LAN/VPN personal tier, still needs live validation.
  - platform: ubuntu
    desktop: XFCE Headless
    session: X11
    status: unsupported
    notes: Splashtop needs an active local desktop session; use RDP for headless XFCE.
  - platform: ubuntu
    desktop: GNOME
    session: Wayland
    status: unsupported
    notes: Splashtop does not expose the local GNOME Wayland compositor unattended.
  - platform: ubuntu
    desktop: KDE Plasma
    session: Wayland
    status: unsupported
    notes: Splashtop does not expose the local KDE Wayland compositor unattended.
down: {destructive: true}
env: [SPLASHTOP_EMAIL, SPLASHTOP_PASSWORD, SPLASHTOP_STREAMER_URL, SPLASHTOP_STREAMER_PATH]
actions:
  - id: splashtop-info
    label: Splashtop Info
    target: splashtop.info
install:
  windows:
    steps: [provision/windows/splashtop.ps1]
    state_files: [env.json]
    fallback: false
